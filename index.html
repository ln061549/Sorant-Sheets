<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>D&D Companion</title>
<style>
body { font-family: Arial; background-color:#1e1e1e; color:white; padding:20px;}
button { margin:5px; padding:10px; font-size:14px;}
#output { white-space: pre-wrap; border:1px solid #555; padding:10px; margin-top:10px; height:300px; overflow:auto; }
input, select { padding:5px; margin:5px;}
</style>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const SUPABASE_URL = "https://ytinfowtmnvokbiageer.supabase.co"   // <-- replace with your project URL
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl0aW5mb3d0bW52b2tiaWFnZWVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MjEyMzksImV4cCI6MjA4Nzk5NzIzOX0.HfAOOZInsu7-xx84AGp0NvOeCaYpNngRG0UKdQIj1Ao" // <-- replace with your anon key

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

// ================= AUTH FUNCTIONS =================
async function register() {
  const email = prompt("Enter your email:")
  const password = prompt("Enter your password:")
  const { data, error } = await supabase.auth.signUp({ email, password })
  if (error) alert("Registration failed: " + error.message)
  else alert("Registration successful! Check your email for confirmation.")
}

async function login() {
  const email = prompt("Enter your email:")
  const password = prompt("Enter your password:")
  const { data, error } = await supabase.auth.signInWithPassword({ email, password })
  if (error) alert("Login failed: " + error.message)
  else alert("Login successful! Welcome, " + email)
}

async function logout() {
  const { error } = await supabase.auth.signOut()
  if (error) alert("Logout failed: " + error.message)
  else alert("You are logged out.")
}

// ================= DICE ROLLER =================
function rollDice(numDice, numSides) {
  let rolls = []
  for (let i=0;i<numDice;i++) rolls.push(Math.floor(Math.random()*numSides)+1)
  return rolls
}

async function diceRoller() {
  let input = prompt("Enter dice to roll (e.g., '2d6+1d20') or 'done' to cancel")
  if (!input || input.toLowerCase().includes("done")) return
  let groups = input.replace(/\s+/g,'').split("+")
  let allRolls = []
  for (let g of groups) {
    let parts = g.split("d")
    if(parts.length!=2) { alert("Invalid dice: "+g); continue }
    let num = parseInt(parts[0]) || 1
    let sides = parseInt(parts[1])
    allRolls.push(...rollDice(num,sides))
  }
  if(confirm("Show individual rolls?")) alert("Rolls: "+allRolls.join(", "))
  else alert("Total: "+allRolls.reduce((a,b)=>a+b,0))
}

// ================= PLAYER MODE =================
async function saveCharacter() {
  const { data: { user } } = await supabase.auth.getUser()
  if (!user) { alert("You must log in first!"); return }
  const name = prompt("Enter character name:")
  const race = prompt("Enter race:")
  const cls = prompt("Enter class:")
  const statsInput = prompt("Enter stats as 6 numbers separated by commas (e.g., 15,14,13,12,10,8):")
  const stats = statsInput.split(",").map(x=>Number(x.trim()))
  const { data, error } = await supabase.from("characters").insert([{ user_id:user.id, name, race, class:cls, stats }])
  if (error) alert("Error saving character: "+error.message)
  else alert("Character saved!")
}

async function viewMyCharacter() {
  const { data: { user } } = await supabase.auth.getUser()
  if (!user) { alert("You must log in first!"); return }
  const { data, error } = await supabase.from("characters").select("*").eq("user_id", user.id).single()
  if (error || !data) alert("No character found")
  else document.getElementById("output").innerText = JSON.stringify(data,null,2)
}

// ================= DM MODE =================
const DM_PASSWORD = "letmein" // simple DM password
async function dmMode() {
  const pw = prompt("Enter DM password:")
  if (pw !== DM_PASSWORD) { alert("Incorrect password!"); return }
  const { data, error } = await supabase.from("characters").select("*")
  if (error) { alert("Error fetching characters: "+error.message); return }
  if (!data.length) { alert("No characters found!"); return }
  document.getElementById("output").innerText = JSON.stringify(data,null,2)
}

// ================= BUTTON EVENT BINDINGS =================
</script>
</head>
<body>
<h1>D&D Companion</h1>
<div>
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
<button onclick="diceRoller()">Dice Roller</button>
<button onclick="saveCharacter()">Player Mode: Save Character</button>
<button onclick="viewMyCharacter()">Player Mode: View Character</button>
<button onclick="dmMode()">DM Mode: View All Characters</button>
</div>
<pre id="output"></pre>
</body>
</html>
