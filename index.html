<body>
<h1>DND Character Manager</h1>

<div class="section">
<h2>Player Character Input</h2>
<label>Player Name: <input id="player" type="text"></label><br>
<label>Character Name: <input id="name" type="text"></label><br>
<label>Class: <input id="class" type="text"></label><br>
<label>Race: <input id="race" type="text"></label><br>
<label>Level: <input id="level" type="number" value="1"></label><br>

<h3>Stats</h3>
<label>STR: <input id="str" type="number" value="10"></label>
<label>DEX: <input id="dex" type="number" value="10"></label>
<label>CON: <input id="con" type="number" value="10"></label><br>
<label>INT: <input id="int" type="number" value="10"></label>
<label>WIS: <input id="wis" type="number" value="10"></label>
<label>CHA: <input id="cha" type="number" value="10"></label><br>

<button id="saveChar">Save Character</button>
</div>

<div class="section">
<h2>DM Mode (View Characters)</h2>
<label>Password: <input id="dmPass" type="password"></label>
<button id="loadChars">Load Characters</button>
<div id="dmView"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
<script>
window.onload = function() {

const SUPABASE_URL = "https://17499.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl0aW5mb3d0bW52b2tiaWFnZWVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MjEyMzksImV4cCI6MjA4Nzk5NzIzOX0.HfAOOZInsu7-xx84AGp0NvOeCaYpNngRG0UKdQIj1Ao";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// --- Save Character ---
async function saveCharacter() {
    const stats = {
        STR: parseInt(document.getElementById("str").value),
        DEX: parseInt(document.getElementById("dex").value),
        CON: parseInt(document.getElementById("con").value),
        INT: parseInt(document.getElementById("int").value),
        WIS: parseInt(document.getElementById("wis").value),
        CHA: parseInt(document.getElementById("cha").value)
    };

    const { data, error } = await supabaseClient
        .from("characters")
        .insert([{
            player_name: document.getElementById("player").value,
            character_name: document.getElementById("name").value,
            class: document.getElementById("class").value,
            race: document.getElementById("race").value,
            level: parseInt(document.getElementById("level").value),
            stats: stats
        }])
        .select();

    if (error) alert("Error: " + error.message);
    else alert("Character saved!");
}

// --- Load Characters for DM ---
async function loadCharacters() {
    const pass = document.getElementById("dmPass").value;
    if (pass !== "dmsecret123") { 
        alert("Wrong password!");
        return;
    }

    const { data, error } = await supabaseClient
        .from("characters")
        .select("*");

    if (error) { alert("Error: " + error.message); return; }

    const container = document.getElementById("dmView");
    container.innerHTML = "";

    data.forEach(c => {
        const div = document.createElement("div");
        div.style.border = "1px solid #000";
        div.style.margin = "5px";
        div.style.padding = "5px";
        div.innerHTML = `
            <b>${c.character_name}</b> (Player: ${c.player_name})<br>
            Class: ${c.class}, Race: ${c.race}, Level: ${c.level}<br>
            Stats: STR ${c.stats.STR}, DEX ${c.stats.DEX}, CON ${c.stats.CON}, INT ${c.stats.INT}, WIS ${c.stats.WIS}, CHA ${c.stats.CHA}
        `;
        container.appendChild(div);
    });
}

// --- Attach to buttons ---
document.getElementById("saveChar").onclick = saveCharacter;
document.getElementById("loadChars").onclick = loadCharacters;

};
</script>
