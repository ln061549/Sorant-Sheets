<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DND Table App</title>
<style>
  body { background-color: #121212; color: #eee; font-family: sans-serif; padding: 20px; }
  input, button { margin: 5px 0; padding: 5px; }
  #login-section, #main-menu { margin-top: 20px; }
</style>
</head>
<body>

<h1>DND Table Manager</h1>

<div id="login-section">
  <h2>Login / Register</h2>
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <br>
  <button id="login-btn">Login</button>
  <button id="register-btn">Register</button>
  <p id="login-msg"></p>
</div>

<div id="main-menu" style="display:none;">
  <h2>Main Menu</h2>
  <p id="welcome-msg"></p>
  <button id="player-mode-btn">Player Mode</button>
  <button id="dm-mode-btn">DM Mode</button>
  <button id="logout-btn">Logout</button>
</div>

<div id="player-section" style="display:none;">
  <h2>Player Character Sheet</h2>
  <button id="load-character-btn">Load My Character</button>
  <div id="character-sheet"></div>
  <button id="back-to-menu-player">Back to Main Menu</button>
</div>

<div id="dm-section" style="display:none;">
  <h2>DM View</h2>
  <button id="load-all-btn">Load All Characters</button>
  <div id="all-sheets"></div>
  <button id="back-to-menu-dm">Back to Main Menu</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// -------------------------
// 1. Connect to Supabase
// -------------------------
const SUPABASE_URL = "YOUR_PROJECT_URL"; // replace with your project URL
const SUPABASE_ANON_KEY = "YOUR_ANON_KEY"; // replace with your anon key
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// -------------------------
// 2. DOM Elements
// -------------------------
const loginSection = document.getElementById("login-section");
const mainMenu = document.getElementById("main-menu");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const loginMsg = document.getElementById("login-msg");
const welcomeMsg = document.getElementById("welcome-msg");

const playerSection = document.getElementById("player-section");
const characterDiv = document.getElementById("character-sheet");

const dmSection = document.getElementById("dm-section");
const allSheetsDiv = document.getElementById("all-sheets");

// -------------------------
// 3. Login & Register
// -------------------------
document.getElementById("login-btn").onclick = async () => {
  const { data, error } = await supabase.auth.signInWithPassword({
    email: emailInput.value,
    password: passwordInput.value
  });
  if (error) {
    loginMsg.innerText = "Login failed: " + error.message;
  } else {
    loginMsg.innerText = "Login successful!";
    showMainMenu(data.user);
  }
};

document.getElementById("register-btn").onclick = async () => {
  const { data, error } = await supabase.auth.signUp({
    email: emailInput.value,
    password: passwordInput.value
  });
  if (error) {
    loginMsg.innerText = "Registration failed: " + error.message;
  } else {
    loginMsg.innerText = "Registered! Check your email to confirm.";
  }
};

// -------------------------
// 4. Show Main Menu
// -------------------------
function showMainMenu(user) {
  loginSection.style.display = "none";
  mainMenu.style.display = "block";
  welcomeMsg.innerText = `Welcome, ${user.email}`;
}

// -------------------------
// 5. Logout
// -------------------------
document.getElementById("logout-btn").onclick = async () => {
  await supabase.auth.signOut();
  loginSection.style.display = "block";
  mainMenu.style.display = "none";
};

// -------------------------
// 6. Player Mode
// -------------------------
document.getElementById("player-mode-btn").onclick = () => {
  mainMenu.style.display = "none";
  playerSection.style.display = "block";
};

document.getElementById("back-to-menu-player").onclick = () => {
  playerSection.style.display = "none";
  mainMenu.style.display = "block";
};

// Load player's character
document.getElementById("load-character-btn").onclick = async () => {
  const user = supabase.auth.getUser();
  const { data, error } = await supabase.from("characters").select("*").eq("user_id", (await user).data.user.id).single();
  if (error) {
    characterDiv.innerText = "No character sheet found.";
  } else {
    characterDiv.innerText = JSON.stringify(data, null, 2);
  }
};

// -------------------------
// 7. DM Mode
// -------------------------
document.getElementById("dm-mode-btn").onclick = () => {
  mainMenu.style.display = "none";
  dmSection.style.display = "block";
};

document.getElementById("back-to-menu-dm").onclick = () => {
  dmSection.style.display = "none";
  mainMenu.style.display = "block";
};

// Load all characters
document.getElementById("load-all-btn").onclick = async () => {
  const { data, error } = await supabase.from("characters").select("*");
  if (error) {
    allSheetsDiv.innerText = "Failed to load characters: " + error.message;
  } else {
    allSheetsDiv.innerText = JSON.stringify(data, null, 2);
  }
};
</script>
</body>
</html>
