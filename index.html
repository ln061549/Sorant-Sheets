<!DOCTYPE html>
<html>
<head>
  <title>DND Control Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<h1>Character Creator</h1>

<input id="player" placeholder="Player Name"><br><br>
<input id="name" placeholder="Character Name"><br><br>
<input id="class" placeholder="Class"><br><br>
<input id="level" type="number" placeholder="Level"><br><br>

<button onclick="saveCharacter()">Save Character</button>

<script>
  const supabaseClient = supabase.createClient(
    "https://ytinfowtmnvokbiageer.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl0aW5mb3d0bW52b2tiaWFnZWVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MjEyMzksImV4cCI6MjA4Nzk5NzIzOX0.HfAOOZInsu7-xx84AGp0NvOeCaYpNngRG0UKdQIj1Ao"
  );

  async function saveCharacter() {
    const player = document.getElementById("player").value;
    const name = document.getElementById("name").value;
    const charClass = document.getElementById("class").value;
    const level = parseInt(document.getElementById("level").value);

    const { data, error } = await supabaseClient
      .from("characters")
      .insert([
        {
          player_name: player,
          character_name: name,
          class: charClass,
          level: level
        }
      ]);

    if (error) {
      alert("Error: " + error.message);
    } else {
      alert("Character saved!");
    }
  }
</script>

</body>
</html>
